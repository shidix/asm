{% load i18n %}


<div class="row modal-head m-0">
    <div class="col-11"><i class="fas fa-users orange"></i>&nbsp; {% trans 'Clientes' %} </div>
    <div class="col-1"> <div class="d-flex justify-content-end"> 
        <button type="button" class="btn btn-lg" data-bs-dismiss="modal" title="{% trans "Close" %}">
        <i class="fas fa-times"></i></button> </div> </div>
</div>

<form class="form m-0" method="GET" action="{% url "clients-form-save" %}" id="form-save">
    {%csrf_token%}
    <div class="row justify-center">
        <div class="col-6"> {% trans "NIF/NIE" %}
            <input type="text" class="form-control autosave" id="code" name="code" value="" placeholder="Código..." /> 
        </div>
        <div class="col-6"> {% trans "Nombre" %}
            <input type="text" class="form-control autosave" id="name" name="name" value="" placeholder="Nombre..." /> 
        </div>
    </div>

    <div class="d-flex justify-content-end p-2">
        {%comment%}
        <button type="button" class="btn btn-primary ark mx-2" data-bs-dismiss="modal" data-url="{% url "clients-list" %}"
            data-target="client-list">{% trans "Guardar" %}</button>
        {%endcomment%}
        <button class="btn btn-primary saveform" data-bs-dismiss="modal" data-form="form-save" data-target="clients-list">
            {% trans "Guardar" %}</button>
        <button type="button" class="btn btn-danger ark cancel" data-bs-dismiss="modal"> {% trans "Cancelar" %}</button>
    </div>
</form>
