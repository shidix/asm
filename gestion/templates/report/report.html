{% extends 'base.html' %}
{% load i18n static %}

{% block central_content %}

    <ul class="nav nav-tabs mx-2 pl-2 pr-2 pt-2">
        <li class="nav-item">
            <button class="nav-link ark report-tab active" data-url="{%url "report-clients"%}" data-target="report-main" 
                onclick="$('.report-tab').removeClass('active');$(this).addClass('active')"> {% trans "Clientes" %}</button>
        </li>
        <li class="nav-item">
            <button class="nav-link ark report-tab" data-url="{%url "report-assistances"%}" data-target="report-main"
                onclick="$('.report-tab').removeClass('active');$(this).addClass('active')"> {% trans "Asistencias" %}</button>
        </li>
        <li class="nav-item">
            <button class="nav-link ark report-tab" data-url="{%url "report-employees"%}" data-target="report-main"
                onclick="$('.report-tab').removeClass('active');$(this).addClass('active')"> {% trans "Trabajadores" %}</button>
        </li>
    </ul>
    <div id="report-main" class="mt-4"> {% include "report/report-clients.html" %} </div>
{% endblock central_content %}
