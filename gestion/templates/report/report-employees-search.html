{% load i18n gestion_tags %}

<form class="form m-0" method="GET" action="{% url "report-employees-search" %}" id="form-search">
    {%csrf_token%}
    <div class="row">
        <div class="col-4">
            <div class="row"> 
                <div class="col-2 py-2 text-end d-none d-lg-block"> <span>{% trans "Fecha:" %}</span> </div>
                <div class="col-5 p-0"> <input type="date" class="form-control form-control-dark w-100 py-2"
                    name="s_rep_emp_idate" id="s_rep_emp_idate" value="{{request.session.s_rep_emp_idate}}"/> </div>
                <div class="col-5 p-0"> <input type="date" class="form-control form-control-dark w-100 py-2" 
                    name="s_rep_emp_edate" id="s_rep_emp_edate" value="{{request.session.s_rep_emp_edate}}"/> </div>
            </div>
        </div>
        <div class="col-7 b-search">
            <div class="row">
                <div class="col-2 py-2 text-end d-none d-lg-block"> <span>{% trans "Trabajador/a:" %}</span> </div>
                <div class="col-3"> 
                    <input type="hidden" class="form-control form-control-dark w-100 py-2" 
                        name="s_rep_emp" id="s_rep_emp" placeholder="Nombre trabajador/a" value="{{request.session.s_rep_emp}}"/> 
                    <input class="form-control input autocomplete" id="rep_emp" name="rep_emp" placeholder="Nombre trabajador/a"
                        value="" data-url="{%url "report-search-emp"%}" data-target="report-search-emp"/> 
                    <div id="report-search-emp"></div>
                </div>
                <div class="col-1 pt-2 text-end"><span>{% trans "Tipo:" %}</span></div>
                <div class="col-2 pt-2 text-center"> 
                    <select class="form-control" id="s_rep_emp_type" name="s_rep_emp_type">
                        <option value="">{% trans "-- Todos --" %}</option>
                        {% for t in emp_types %}
                            <option value="{{t.id}}" {%if t.id == request.session.s_rep_emp_type%}selected{%endif%}>{{t.name}}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
        </div>
        <div class="col-1 p-0">
            <button class="btn btn-default saveform w-100" data-form="form-search" data-target="emp-list">
                <i class="fas fa-search"></i> </button>
        </div>
    </div>
</form>
