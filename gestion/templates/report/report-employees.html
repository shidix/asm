{% load i18n static %}

<div class="row toolbar-search p-2 m-0">
    <div class="col-11">{% include "report/report-employees-search.html" %} </div>
    <div class="col-1"> 
        {%comment%}
        <a class="btn btn-xs exp w-75" href="{% url "report-export" %}" title="{% trans 'Exportar a CSV' %}" target="_blank">
            <i class="fas fa-file-csv"></i> <span class="d-none d-lg-block">{% trans "Exportar" %}</span></a>
        {%endcomment%}
    </div>
</div>

<div class="content mt-3">
    <div class="d-lg-none"> 
        <div class="toolbar-content p-3 m-0">
            <h2 class="pathway b-right"> <i class="fas fa-users orange"></i>
                <span id="items-counter" class="badge badge-secondary">{{items|length}}</span></h2>
        </div>
    </div>

    <div id="emp-list" class="ml-list">{% include "report/report-employees-list.html" %}</div>
</div>
